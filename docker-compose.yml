version: "3.8"

services:
  openplc:
    image: openplc/openplc_v3:latest
    container_name: openplc_runtime
    ports:
      - "8080:8080"   # OpenPLC web dashboard
      - "502:502"     # Modbus TCP
      - "4840:4840"   # OPC UA
    restart: unless-stopped
    volumes:
      - openplc_data:/workdir
    environment:
      - TZ=Europe/Berlin

volumes:
  openplc_data:
